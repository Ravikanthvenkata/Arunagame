
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animal Puzzle With Working iPad Sound</title>

<style>

body{
    font-family:Arial;
    text-align:center;
    background:#eef3ff;
    margin:0;
    padding:10px;
}

#board{
    display:grid;
    gap:4px;
    justify-content:center;
    margin-top:20px;
    touch-action:none;
}

.cell{
    width:58px;
    height:58px;
    background:white;
    border:2px solid #999;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    user-select:none;
}

.empty{
    background:#d5ddff;
}

button{
    padding:8px 12px;
    margin:3px;
    border:none;
    border-radius:10px;
    background:#6075ff;
    color:white;
    font-size:14px;
}

#bear{
    font-size:90px;
    margin-top:10px;
}

#praise{
    font-size:28px;
    color:#ff6a00;
    font-weight:bold;
}

#msg{
    margin-top:10px;
    font-size:22px;
    color:green;
    font-weight:bold;
}

</style>
</head>

<body>

<h2>Animal Line Puzzle</h2>

<p>Slide animals with finger and complete lines.</p>

<div>
<button onclick="newGame(3)">3×3</button>
<button onclick="newGame(4)">4×4</button>
<button onclick="newGame(5)">5×5</button>
<button onclick="newGame(6)">6×6</button>
<button onclick="newGame(7)">7×7</button>
<button onclick="newGame(8)">8×8</button>
<button onclick="newGame(9)">9×9</button>
</div>

<div id="board"></div>

<div id="bear">🧸</div>

<div id="praise">Let's Play!</div>

<div id="msg"></div>

<script>

const animals=["🐶","🐱","🐼","🐸","🐵","🦊","🐰","🐨"];

let board=[];
let size=3;
let dragIndex=null;
let celebrated=[];

let audioCtx=null;

function unlockAudio(){

    if(audioCtx==null){

        audioCtx = new (
            window.AudioContext ||
            window.webkitAudioContext
        )();
    }

    if(audioCtx.state==="suspended"){

        audioCtx.resume();
    }
}

document.body.addEventListener(
    "touchstart",
    unlockAudio,
    {once:true}
);

document.body.addEventListener(
    "mousedown",
    unlockAudio,
    {once:true}
);

function newGame(n){

    size=n;

    board=[];

    celebrated=[];

    const total=n*n;

    const groups=n-1;

    let selected=[];

    while(selected.length<groups){

        let a=animals[Math.floor(Math.random()*animals.length)];

        if(!selected.includes(a)){

            selected.push(a);
        }
    }

    for(let animal of selected){

        for(let i=0;i<n;i++){

            board.push(animal);
        }
    }

    while(board.length < total-2){

        let a=animals[Math.floor(Math.random()*animals.length)];

        board.push(a);
    }

    board.push("");
    board.push("");

    shuffle(board);

    render();

    document.getElementById("msg").innerHTML="";
    document.getElementById("praise").innerHTML="Let's Play!";
}

function shuffle(arr){

    for(let i=arr.length-1;i>0;i--){

        let j=Math.floor(Math.random()*(i+1));

        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
}

function render(){

    const b=document.getElementById("board");

    b.style.gridTemplateColumns=`repeat(${size},58px)`;

    b.innerHTML="";

    board.forEach((item,index)=>{

        let d=document.createElement("div");

        d.className="cell";

        if(item==""){

            d.classList.add("empty");

        }else{

            d.innerHTML=item;
        }

        d.dataset.index=index;

        b.appendChild(d);
    });

    attachEvents();

    checkLines();
}

function attachEvents(){

    const boardDiv=document.getElementById("board");

    boardDiv.onpointerdown=function(e){

        const cell=e.target.closest(".cell");

        if(!cell) return;

        dragIndex=parseInt(cell.dataset.index);
    };

    boardDiv.onpointermove=function(e){

        if(dragIndex===null) return;

        const element=document.elementFromPoint(
            e.clientX,
            e.clientY
        );

        if(!element) return;

        if(!element.classList.contains("cell")) return;

        let target=parseInt(element.dataset.index);

        slide(dragIndex,target);
    };

    boardDiv.onpointerup=function(){

        dragIndex=null;
    };
}

function slide(from,to){

    if(board[from]=="") return;

    if(board[to]!="") return;

    let fr=Math.floor(from/size);
    let fc=from%size;

    let tr=Math.floor(to/size);
    let tc=to%size;

    if(Math.abs(fr-tr)+Math.abs(fc-tc)==1){

        board[to]=board[from];
        board[from]="";

        dragIndex=to;

        render();
    }
}

function checkLines(){

    let lines=0;

    for(let r=0;r<size;r++){

        let row=[];

        for(let c=0;c<size;c++){

            row.push(board[r*size+c]);
        }

        if(validLine(row)){

            lines++;

            celebrate("row"+r);
        }
    }

    for(let c=0;c<size;c++){

        let col=[];

        for(let r=0;r<size;r++){

            col.push(board[r*size+c]);
        }

        if(validLine(col)){

            lines++;

            celebrate("col"+c);
        }
    }

    if(lines>=size-1){

        document.getElementById("msg").innerHTML=
        "🏆 All Lines Completed!";
    }
}

function validLine(arr){

    if(arr.includes("")) return false;

    return arr.every(v=>v===arr[0]);
}

function celebrate(id){

    if(celebrated.includes(id)) return;

    celebrated.push(id);

    const texts=[
        "🧸 GREAT JOB!",
        "🧸 AMAZING!",
        "🧸 SUPER!",
        "🧸 WOW!",
        "🧸 EXCELLENT!"
    ];

    document.getElementById("praise").innerHTML=
    texts[Math.floor(Math.random()*texts.length)];

    playApplause();
}

function playApplause(){

    if(audioCtx==null) return;

    for(let i=0;i<12;i++){

        let osc=audioCtx.createOscillator();

        let gain=audioCtx.createGain();

        osc.connect(gain);

        gain.connect(audioCtx.destination);

        osc.type="triangle";

        osc.frequency.value=
            400 + Math.random()*1000;

        let start=audioCtx.currentTime+i*0.03;

        gain.gain.setValueAtTime(0.15,start);

        gain.gain.exponentialRampToValueAtTime(
            0.0001,
            start+0.15
        );

        osc.start(start);

        osc.stop(start+0.15);
    }
}

newGame(3);

</script>

</body>
</html>
